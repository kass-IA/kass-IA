<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 210" width="240" height="210">
  <defs>
    <style>
      @keyframes peek {
        0%,100%{transform:translateY(0px)}
        50%{transform:translateY(-7px)}
      }
      @keyframes wave {
        0%,100%{transform:rotate(0deg)}
        25%{transform:rotate(-28deg)}
        75%{transform:rotate(22deg)}
      }
      @keyframes blink {
        0%,43%,57%,100%{transform:scaleY(1)}
        50%{transform:scaleY(0.05)}
      }
      @keyframes sparkle {
        0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
        45%,55%{opacity:1;transform:scale(1) rotate(180deg)}
      }
      @keyframes heart-float {
        0%{opacity:0;transform:translateY(0px) scale(.6)}
        45%{opacity:1;transform:translateY(-18px) scale(1)}
        100%{opacity:0;transform:translateY(-35px) scale(.7)}
      }
      .face-group{animation:peek 3.1s ease-in-out infinite}
      .eye-l{transform-box:fill-box;transform-origin:center;animation:blink 4.2s ease-in-out infinite}
      .eye-r{transform-box:fill-box;transform-origin:center;animation:blink 4.2s ease-in-out infinite .12s}
      .arm{transform-box:fill-box;transform-origin:50% 100%;animation:wave 0.95s ease-in-out infinite}
      .sp1{animation:sparkle 2.2s ease-in-out infinite}
      .sp2{animation:sparkle 2.2s ease-in-out infinite .75s}
      .sp3{animation:sparkle 2.2s ease-in-out infinite 1.4s}
      .hrt1{animation:heart-float 2.8s ease-in-out infinite}
      .hrt2{animation:heart-float 2.8s ease-in-out infinite 1.3s}
    </style>
  </defs>

  <!-- pink ledge she is peeking over -->
  <rect x="0" y="152" width="240" height="58" rx="14" fill="#FF6CAB"/>
  <rect x="0" y="147" width="240" height="16" rx="8" fill="#FF91C2"/>
  <!-- ledge shine -->
  <rect x="18" y="149" width="90" height="5" rx="2.5" fill="#FFB8D8" opacity=".55"/>

  <!-- face group (only top visible above ledge) -->
  <g class="face-group">
    <!-- hair back -->
    <ellipse cx="120" cy="108" rx="70" ry="78" fill="#3d1a35"/>
    <!-- side hair volumes -->
    <ellipse cx="57" cy="126" rx="20" ry="34" fill="#3d1a35"/>
    <ellipse cx="183" cy="126" rx="20" ry="34" fill="#3d1a35"/>
    <!-- stray strands -->
    <path d="M58,92 Q48,58 62,78" stroke="#3d1a35" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M182,92 Q192,58 178,78" stroke="#3d1a35" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- face skin -->
    <ellipse cx="120" cy="130" rx="56" ry="56" fill="#FFD5B0"/>

    <!-- hair bow left -->
    <path d="M62,90 Q76,80 90,90 Q76,100 62,90Z" fill="#FF6CAB"/>
    <circle cx="76" cy="90" r="6" fill="#FF91C2"/>
    <circle cx="76" cy="90" r="2.8" fill="#FFD6EC"/>

    <!-- star pin right -->
    <path d="M160,74 L162,66 L164,74 L172,74 L166,79 L168,87 L162,82 L156,87 L158,79 L152,74Z" fill="#FFD700"/>
    <circle cx="162" cy="74" r="3" fill="white" opacity=".7"/>

    <!-- eye left -->
    <g class="eye-l">
      <ellipse cx="96" cy="120" rx="21" ry="23" fill="white"/>
      <!-- upper shadow -->
      <path d="M75,113 Q96,104 117,113 L117,118 Q96,109 75,118Z" fill="#e0c0d8" opacity=".35"/>
      <!-- iris -->
      <ellipse cx="96" cy="122" rx="15" ry="17" fill="#7B3FA0"/>
      <ellipse cx="96" cy="120" rx="9" ry="10" fill="#9B5FC0"/>
      <!-- pupil -->
      <ellipse cx="96" cy="122" rx="7.5" ry="8.5" fill="#1a0a2a"/>
      <!-- shines -->
      <circle cx="103" cy="114" r="6.5" fill="white"/>
      <circle cx="89" cy="124" r="3" fill="white" opacity=".5"/>
      <!-- top lashes -->
      <path d="M75,111 Q96,101 117,111" stroke="#2a0a3a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <line x1="77" y1="111" x2="72" y2="103" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="86" y1="107" x2="83" y2="99" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="96" y1="105" x2="95" y2="96" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="106" y1="107" x2="109" y2="99" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="115" y1="111" x2="120" y2="103" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <!-- bottom lash line -->
      <path d="M78,133 Q96,140 114,133" stroke="#2a0a3a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- eye right -->
    <g class="eye-r">
      <ellipse cx="144" cy="120" rx="21" ry="23" fill="white"/>
      <path d="M123,113 Q144,104 165,113 L165,118 Q144,109 123,118Z" fill="#e0c0d8" opacity=".35"/>
      <ellipse cx="144" cy="122" rx="15" ry="17" fill="#7B3FA0"/>
      <ellipse cx="144" cy="120" rx="9" ry="10" fill="#9B5FC0"/>
      <ellipse cx="144" cy="122" rx="7.5" ry="8.5" fill="#1a0a2a"/>
      <circle cx="151" cy="114" r="6.5" fill="white"/>
      <circle cx="137" cy="124" r="3" fill="white" opacity=".5"/>
      <path d="M123,111 Q144,101 165,111" stroke="#2a0a3a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <line x1="125" y1="111" x2="120" y2="103" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="134" y1="107" x2="131" y2="99" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="144" y1="105" x2="143" y2="96" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="154" y1="107" x2="157" y2="99" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="163" y1="111" x2="168" y2="103" stroke="#2a0a3a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M126,133 Q144,140 162,133" stroke="#2a0a3a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- eyebrows -->
    <path d="M77,101 Q96,93 114,101" stroke="#3d1a35" stroke-width="3.8" fill="none" stroke-linecap="round"/>
    <path d="M126,101 Q144,93 162,101" stroke="#3d1a35" stroke-width="3.8" fill="none" stroke-linecap="round"/>

    <!-- blush -->
    <ellipse cx="78" cy="134" rx="15" ry="10" fill="#FFB6C1" opacity=".55"/>
    <circle cx="70" cy="135" r="2.5" fill="#FF91A4" opacity=".4"/>
    <circle cx="76" cy="139" r="2" fill="#FF91A4" opacity=".4"/>
    <circle cx="83" cy="140" r="2.5" fill="#FF91A4" opacity=".4"/>
    <ellipse cx="162" cy="134" rx="15" ry="10" fill="#FFB6C1" opacity=".55"/>
    <circle cx="154" cy="135" r="2.5" fill="#FF91A4" opacity=".4"/>
    <circle cx="160" cy="139" r="2" fill="#FF91A4" opacity=".4"/>
    <circle cx="167" cy="140" r="2.5" fill="#FF91A4" opacity=".4"/>
  </g>

  <!-- waving arm (comes from side of ledge) -->
  <g class="arm">
    <!-- sleeve -->
    <rect x="198" y="144" width="26" height="18" rx="8" fill="#FF6CAB"/>
    <!-- arm -->
    <path d="M210,152 Q216,128 212,110" stroke="#FFD5B0" stroke-width="17" fill="none" stroke-linecap="round"/>
    <!-- hand -->
    <circle cx="212" cy="108" r="13" fill="#FFD5B0"/>
    <!-- fingers -->
    <ellipse cx="205" cy="98" rx="6.5" ry="9.5" fill="#FFD5B0" transform="rotate(-22,205,98)"/>
    <ellipse cx="212" cy="95" rx="6.5" ry="9.5" fill="#FFD5B0" transform="rotate(-5,212,95)"/>
    <ellipse cx="220" cy="97" rx="6.5" ry="9.5" fill="#FFD5B0" transform="rotate(12,220,97)"/>
    <ellipse cx="224" cy="105" rx="5.5" ry="8.5" fill="#FFD5B0" transform="rotate(25,224,105)"/>
    <!-- knuckle dots -->
    <circle cx="205" cy="97" r="1.8" fill="#FFBB99" opacity=".5"/>
    <circle cx="212" cy="94" r="1.8" fill="#FFBB99" opacity=".5"/>
    <circle cx="220" cy="96" r="1.8" fill="#FFBB99" opacity=".5"/>
  </g>

  <!-- sparkles -->
  <g class="sp1">
    <path d="M26,72 L28,63 L30,72 L39,72 L32,77 L34,86 L28,81 L22,86 L24,77 L17,72Z" fill="#FFD700"/>
    <circle cx="28" cy="72" r="3.5" fill="white" opacity=".75"/>
  </g>
  <g class="sp2">
    <path d="M178,50 L180,41 L182,50 L191,50 L184,55 L186,64 L180,59 L174,64 L176,55 L169,50Z" fill="#FF6CAB"/>
    <circle cx="180" cy="50" r="3" fill="white" opacity=".75"/>
  </g>
  <g class="sp3">
    <path d="M205,82 L206.5,76 L208,82 L214,82 L209.5,85.5 L211,91.5 L206.5,88 L202,91.5 L203.5,85.5 L199,82Z" fill="#C084FC"/>
    <circle cx="206.5" cy="82" r="2.2" fill="white" opacity=".75"/>
  </g>

  <!-- floating hearts -->
  <g class="hrt1">
    <path d="M44,98 C44,94 39,89 35,93 C31,97 35,104 44,111 C53,104 57,97 53,93 C49,89 44,94 44,98Z"
          fill="#FF6CAB" transform="scale(0.45)"/>
  </g>
  <g class="hrt2">
    <path d="M44,98 C44,94 39,89 35,93 C31,97 35,104 44,111 C53,104 57,97 53,93 C49,89 44,94 44,98Z"
          fill="#FF91C2" transform="scale(0.35) translate(265,-15)"/>
  </g>
</svg>
