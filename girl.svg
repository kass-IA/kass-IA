<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 145" width="130" height="145">
  <defs>
    <style>
      @keyframes float {
        0%,100%{transform:translateY(0px)}
        50%{transform:translateY(-7px)}
      }
      @keyframes blink {
        0%,44%,56%,100%{transform:scaleY(1)}
        50%{transform:scaleY(0.05)}
      }
      @keyframes leg-l {
        0%,100%{transform:rotate(-16deg)}
        50%{transform:rotate(16deg)}
      }
      @keyframes leg-r {
        0%,100%{transform:rotate(16deg)}
        50%{transform:rotate(-16deg)}
      }
      @keyframes wave {
        0%,100%{transform:rotate(-45deg)}
        40%{transform:rotate(-70deg)}
        70%{transform:rotate(-52deg)}
      }
      .chibi{animation:float 2.4s ease-in-out infinite}
      .eye-l{transform-box:fill-box;transform-origin:center;animation:blink 3.5s ease-in-out infinite}
      .eye-r{transform-box:fill-box;transform-origin:center;animation:blink 3.5s ease-in-out infinite .12s}
      .leg-l{transform-box:fill-box;transform-origin:top center;animation:leg-l .65s ease-in-out infinite}
      .leg-r{transform-box:fill-box;transform-origin:top center;animation:leg-r .65s ease-in-out infinite}
      .arm-r{transform-box:fill-box;transform-origin:left top;animation:wave .75s ease-in-out infinite}
    </style>
  </defs>

  <!-- shadow -->
  <ellipse cx="62" cy="139" rx="26" ry="5" fill="#FF6CAB" opacity=".15"/>

  <g class="chibi">

    <!-- ====== HAIR (drawn first / behind everything) ====== -->
    <!-- top of head -->
    <rect x="41" y="10" width="48" height="6" fill="#1a0a0a"/>
    <!-- second row -->
    <rect x="35" y="16" width="60" height="6" fill="#1a0a0a"/>
    <!-- bangs wide rows -->
    <rect x="29" y="22" width="72" height="6" fill="#1a0a0a"/>
    <rect x="29" y="28" width="72" height="6" fill="#1a0a0a"/>
    <!-- eye row: hair split around eyes -->
    <rect x="29" y="34" width="18" height="6" fill="#1a0a0a"/>
    <rect x="53" y="34" width="24" height="6" fill="#1a0a0a"/>
    <rect x="83" y="34" width="18" height="6" fill="#1a0a0a"/>
    <!-- lower bangs / chin -->
    <rect x="29" y="40" width="72" height="6" fill="#1a0a0a"/>
    <rect x="29" y="46" width="72" height="6" fill="#1a0a0a"/>
    <!-- long side hair panels -->
    <rect x="29" y="52" width="12" height="42" fill="#1a0a0a"/>
    <rect x="89" y="52" width="12" height="42" fill="#1a0a0a"/>
    <!-- hair highlight (subtle pixel) -->
    <rect x="47" y="13" width="6" height="3" fill="#3d1a2e" opacity=".6"/>
    <rect x="59" y="10" width="4" height="3" fill="#3d1a2e" opacity=".4"/>

    <!-- ====== EYES (peek through bangs) ====== -->
    <rect class="eye-l" x="47" y="34" width="6" height="6" fill="#0a0a0a"/>
    <rect class="eye-r" x="77" y="34" width="6" height="6" fill="#0a0a0a"/>
    <!-- tiny shine dots on eyes -->
    <rect x="50" y="35" width="2" height="2" fill="white" opacity=".85"/>
    <rect x="80" y="35" width="2" height="2" fill="white" opacity=".85"/>

    <!-- ====== LEFT ARM (static) ====== -->
    <rect x="23" y="58" width="12" height="18" fill="#FF6CAB"/>
    <!-- left hand -->
    <rect x="23" y="74" width="12" height="5" fill="#FFD5B0"/>

    <!-- ====== HOODIE BODY ====== -->
    <!-- shoulders -->
    <rect x="35" y="52" width="60" height="6" fill="#FF6CAB"/>
    <!-- torso -->
    <rect x="35" y="58" width="60" height="12" fill="#FF6CAB"/>
    <!-- front pocket -->
    <rect x="50" y="63" width="30" height="4" fill="#e0509a" opacity=".4"/>

    <!-- ====== RIGHT ARM (waving) ====== -->
    <g class="arm-r">
      <rect x="95" y="58" width="12" height="18" fill="#FF6CAB"/>
      <rect x="95" y="74" width="12" height="5" fill="#FFD5B0"/>
    </g>

    <!-- ====== SKIRT (white) ====== -->
    <rect x="35" y="70" width="60" height="6" fill="#f5f5f5"/>
    <rect x="29" y="76" width="72" height="6" fill="#f5f5f5"/>
    <rect x="35" y="82" width="60" height="6" fill="#f5f5f5"/>
    <!-- hem line -->
    <rect x="29" y="85" width="72" height="3" fill="#d8d8d8" opacity=".6"/>

    <!-- ====== LEGS ====== -->
    <g class="leg-l">
      <rect x="47" y="88" width="12" height="12" fill="#FFD5B0"/>
    </g>
    <g class="leg-r">
      <rect x="71" y="88" width="12" height="12" fill="#FFD5B0"/>
    </g>

    <!-- ====== SHOES (white) ====== -->
    <!-- left shoe -->
    <rect x="41" y="100" width="24" height="6" fill="#eeeeee"/>
    <rect x="41" y="100" width="7" height="6" fill="#cccccc"/>
    <!-- right shoe -->
    <rect x="65" y="100" width="24" height="6" fill="#eeeeee"/>
    <rect x="65" y="100" width="7" height="6" fill="#cccccc"/>

  </g>
</svg>
